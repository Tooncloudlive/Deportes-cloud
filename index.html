<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --primary: #f767d8;
  --primary-glow: rgba(247, 103, 216, 0.4);
  --secondary: #7c3aed;
  --bg-dark: #0a0a0f;
  --bg-card: rgba(255, 255, 255, 0.03);
  --bg-card-hover: rgba(255, 255, 255, 0.06);
  --text-primary: #ffffff;
  --text-secondary: #a1a1aa;
  --border: rgba(255, 255, 255, 0.08);
  --success: #22c55e;
  --warning: #f59e0b;
  --danger: #ef4444;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Animated background gradient */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(ellipse at 20% 20%, rgba(247, 103, 216, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(124, 58, 237, 0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(247, 103, 216, 0.03) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 1000px;
  margin: auto;
  padding: 40px 20px;
}

/* Header */
header {
  text-align: center;
  margin-bottom: 40px;
  padding: 20px 0;
}

.logo {
  display: inline-flex;
  align-items: center;
  gap: 15px;
  margin-bottom: 10px;
}

.logo-icon {
  width: 50px;
  height: 50px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 20px var(--primary-glow); }
  50% { box-shadow: 0 0 40px var(--primary-glow), 0 0 60px var(--primary-glow); }
}

h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: 2.5rem;
  font-weight: 700;
  background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -1px;
}

.subtitle {
  color: var(--text-secondary);
  font-size: 1rem;
  font-weight: 400;
}

/* Stats bar */
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-bottom: 30px;
  flex-wrap: wrap;
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 50px;
  font-size: 0.9rem;
}

.stat-item .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  animation: blink 1.5s ease-in-out infinite;
}

.stat-item.live .dot {
  background: var(--success);
  box-shadow: 0 0 10px var(--success);
}

.stat-item.upcoming .dot {
  background: var(--warning);
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Search */
.search-container {
  position: relative;
  margin-bottom: 30px;
}

.search-icon {
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-secondary);
  font-size: 1.1rem;
}

.search {
  width: 100%;
  padding: 16px 20px 16px 55px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-primary);
  font-size: 1rem;
  font-family: 'Inter', sans-serif;
  transition: all 0.3s ease;
  backdrop-filter: blur(10px);
}

.search::placeholder {
  color: var(--text-secondary);
}

.search:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-glow);
  background: var(--bg-card-hover);
}

/* Section headers */
.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  padding: 0 10px;
}

.section-title {
  font-size: 0.85rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-secondary);
}

.section-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--border) 0%, transparent 100%);
}

/* Cards */
#events {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.card {
  position: relative;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  backdrop-filter: blur(10px);
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 4px;
  height: 100%;
  background: linear-gradient(180deg, var(--primary), var(--secondary));
  opacity: 0;
  transition: opacity 0.3s ease;
}

.card:hover {
  background: var(--bg-card-hover);
  border-color: rgba(247, 103, 216, 0.2);
  transform: translateX(5px);
}

.card:hover::before {
  opacity: 1;
}

.card.live {
  border-color: rgba(34, 197, 94, 0.3);
  background: linear-gradient(90deg, rgba(34, 197, 94, 0.05) 0%, var(--bg-card) 100%);
}

.card.live::before {
  background: linear-gradient(180deg, var(--success), #16a34a);
  opacity: 1;
}

.card.finished {
  opacity: 0.6;
}

.info {
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex: 1;
}

.time-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.time {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: 1px;
}

.league-badge {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 4px 10px;
  background: rgba(247, 103, 216, 0.15);
  color: var(--primary);
  border-radius: 20px;
}

.match {
  font-size: 1rem;
  font-weight: 500;
  color: var(--text-primary);
  line-height: 1.4;
}

.status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.status.live {
  color: var(--success);
}

.status.upcoming {
  color: var(--warning);
}

.status.finished {
  color: var(--text-secondary);
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

.status.live .status-dot {
  background: var(--success);
  animation: pulse-dot 1.5s ease-in-out infinite;
}

.status.upcoming .status-dot {
  background: var(--warning);
}

.status.finished .status-dot {
  background: var(--text-secondary);
}

@keyframes pulse-dot {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.3); opacity: 0.7; }
}

/* Channel selector */
.channel-selector {
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: flex-end;
}

.channel-select {
  padding: 10px 16px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: rgba(255, 255, 255, 0.05);
  color: var(--text-primary);
  font-size: 0.85rem;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all 0.3s ease;
  min-width: 140px;
}

.channel-select:hover {
  border-color: var(--primary);
  background: rgba(255, 255, 255, 0.08);
}

.channel-select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-glow);
}

.channel-select option {
  background: var(--bg-dark);
  color: var(--text-primary);
  padding: 8px;
}

.channels-count {
  font-size: 0.75rem;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 5px;
}

.channels-count::before {
  content: '📡';
  font-size: 0.9rem;
}

/* Button */
.btn-watch {
  padding: 12px 24px;
  border-radius: 12px;
  border: none;
  font-weight: 600;
  font-size: 0.9rem;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-watch.enabled {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: white;
  box-shadow: 0 4px 20px var(--primary-glow);
}

.btn-watch.enabled:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px var(--primary-glow);
}

.btn-watch.enabled:active {
  transform: translateY(0);
}

.btn-watch.disabled {
  background: rgba(255, 255, 255, 0.05);
  color: var(--text-secondary);
  cursor: not-allowed;
}

/* Player */
.player-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.9);
  backdrop-filter: blur(10px);
  z-index: 1000;
  padding: 40px 20px;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.player-container {
  max-width: 1200px;
  margin: 0 auto;
  height: 100%;
  display: flex;
  flex-direction: column;
}

.player-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.player-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.2rem;
  font-weight: 600;
}

.btn-close {
  padding: 10px 24px;
  background: rgba(239, 68, 68, 0.2);
  color: var(--danger);
  border: 1px solid rgba(239, 68, 68, 0.3);
  border-radius: 10px;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-close:hover {
  background: rgba(239, 68, 68, 0.3);
}

.player-wrapper {
  flex: 1;
  background: var(--bg-card);
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid var(--border);
}

#video-player {
  width: 100%;
  height: 100%;
  border: none;
  background: #000;
}

#iframe-player {
  width: 100%;
  height: 100%;
  border: none;
  background: #000;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
}

.empty-state-icon {
  font-size: 4rem;
  margin-bottom: 20px;
  opacity: 0.5;
}

.empty-state-text {
  font-size: 1.1rem;
}

/* Scrollbar */
::-webkit-scrollbar {
  width: 8px;
}

::-webkit-scrollbar-track {
  background: var(--bg-dark);
}

::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
  background: rgba(255, 255, 255, 0.15);
}

/* Responsive */
@media (max-width: 768px) {
  h1 {
    font-size: 1.8rem;
  }
  
  .card {
    flex-direction: column;
    align-items: flex-start;
    gap: 15px;
    padding: 18px;
  }
  
  .channel-selector {
    width: 100%;
    align-items: stretch;
  }
  
  .channel-select {
    width: 100%;
  }
  
  .btn-watch {
    width: 100%;
    justify-content: center;
  }
  
  .stats-bar {
    gap: 15px;
  }
  
  .stat-item {
    padding: 8px 16px;
    font-size: 0.8rem;
  }
  
  .player-overlay {
    padding: 20px 15px;
  }
  
  .player-header {
    flex-direction: column;
    gap: 15px;
    align-items: flex-start;
  }
  
  .btn-close {
    width: 100%;
    justify-content: center;
  }
}

/* Loading animation */
.loading {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 2px solid rgba(255, 255, 255, 0.1);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>

// Guardar los eventos agrupados para actualización
let groupedEventsCache = [];

// Extraer nombre de la liga del partido
function getLeague(match) {
  const leagues = {
    'Super Lig': 'Super Lig',
    'UEFA Champions League': 'UCL',
    'Liga BetPlay': 'BetPlay',
    'Copa de Primera': 'Primera',
    'Liga Profesional': 'LPF',
    'CONCACAF Champions Cup': 'Concacaf'
  };
  
  for (const [key, value] of Object.entries(leagues)) {
    if (match.includes(key)) return value;
  }
  return 'PARTIDO';
}

// Extraer nombre del canal desde el link original
function getChannelFromLink(link) {
  const match = link.match(/channel=([a-zA-Z0-9]+)/);
  return match ? match[1] : null;
}

// Formatear nombre del canal para mostrar
function formatChannelName(channel) {
  const channelNames = {
    'disney1': 'Disney+ 1',
    'disney2': 'Disney+ 2',
    'disney3': 'Disney+ 3',
    'disney4': 'Disney+ 4',
    'disney5': 'Disney+ 5',
    'max1': 'Max 1',
    'max2': 'Max 2',
    'max3': 'Max 3',
    'espn': 'ESPN',
    'espn2': 'ESPN 2',
    'espn5': 'ESPN 5',
    'espnpremium': 'ESPN Premium',
    'tudnus': 'TUDN',
    'fox1ar': 'Fox Sports 1 AR',
    'fox2ar': 'Fox Sports 2 AR',
    'foxone1': 'Fox Sports 1',
    'foxone2': 'Fox Sports 2',
    'paramount1': 'Paramount+ 1',
    'paramount2': 'Paramount+ 2',
    'paramount3': 'Paramount+ 3',
    'paramount4': 'Paramount+ 4',
    'winplus': 'Win Sports+',
    'winplus2': 'Win Sports+ 2',
    'fanatiz1': 'Fanatiz 1',
    'fanatiz2': 'Fanatiz 2',
    'fanatiz3': 'Fanatiz 3',
    'fanatiz4': 'Fanatiz 4',
    'fanatiz5': 'Fanatiz 5',
    'fanatiz6': 'Fanatiz 6',
    'fanatiz7': 'Fanatiz 7',
    'tntar': 'TNT Sports',
    'tycint': 'TyC Sports'
  };
  return channelNames[channel] || channel.toUpperCase();
}

// Agrupar eventos por partido
function groupEventsByMatch(events) {
  const grouped = {};
  
  events.forEach(ev => {
    const key = `${ev.time}_${ev.match}`;
    if (!grouped[key]) {
      grouped[key] = {
        time: ev.time,
        match: ev.match,
        channels: []
      };
    }
    const channel = getChannelFromLink(ev.link);
    if (channel) {
      grouped[key].channels.push({
        name: channel,
        link: ev.link,
        displayName: formatChannelName(channel)
      });
    }
  });
  
  // Ordenar canales alfabéticamente
  Object.values(grouped).forEach(group => {
    group.channels.sort((a, b) => a.displayName.localeCompare(b.displayName));
  });
  
  return Object.values(grouped);
}

// convertir hora a fecha real
function getEventDate(time) {
  const [h, m] = time.split(":").map(Number);
  const d = new Date();
  d.setHours(h, m, 0, 0);
  return d;
}

// estado dinámico
function getStatus(eventTime) {
  const now = new Date();
  const start = getEventDate(eventTime);
  const end = new Date(start.getTime() + 2 * 60 * 60 * 1000);

  if (now < start) return "PROXIMO";
  if (now >= start && now <= end) return "EN VIVO";
  return "FINALIZADO";
}

// update stats
function updateStats(list) {
  let live = 0, upcoming = 0;
  list.forEach(ev => {
    const status = getStatus(ev.time);
    if (status === "EN VIVO") live++;
    else if (status === "PROXIMO") upcoming++;
  });
  document.getElementById("live-count").textContent = `${live} EN VIVO`;
  document.getElementById("upcoming-count").textContent = `${upcoming} PRÓXIMOS`;
}

// Generar ID único para cada partido
function getMatchId(time, match) {
  return `${time}-${match.replace(/[^a-zA-Z0-9]/g, '-')}`;
}

// render - solo se llama una vez al inicio o al filtrar
function renderEvents(list = eventsData) {
  const container = document.getElementById("events");
  container.innerHTML = "";
  
  // Agrupar eventos por partido y guardar en caché
  groupedEventsCache = groupEventsByMatch(list);
  
  updateStats(list);

  if (groupedEventsCache.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🔍</div>
        <p class="empty-state-text">No se encontraron partidos</p>
      </div>
    `;
    return;
  }

  groupedEventsCache.sort((a, b) => a.time.localeCompare(b.time));

  groupedEventsCache.forEach(ev => {
    const status = getStatus(ev.time);
    const isActive = status === "EN VIVO";
    const isFinished = status === "FINALIZADO";
    const league = getLeague(ev.match);
    const hasMultipleChannels = ev.channels.length > 1;
    const matchId = getMatchId(ev.time, ev.match);

    const div = document.createElement("div");
    div.className = `card ${isActive ? 'live' : ''} ${isFinished ? 'finished' : ''}`;
    div.dataset.matchId = matchId;
    div.dataset.time = ev.time;

    // Generar opciones del selector de canales
    let channelSelectHTML = '';
    if (!isFinished && ev.channels.length > 0) {
      if (hasMultipleChannels) {
        channelSelectHTML = `
          <select class="channel-select" data-match-id="${matchId}">
            ${ev.channels.map((ch, idx) => `<option value="${ch.link}">${ch.displayName}</option>`).join('')}
          </select>
          <span class="channels-count">${ev.channels.length} canales disponibles</span>
        `;
      } else {
        channelSelectHTML = `
          <select class="channel-select" data-match-id="${matchId}" style="display:none;">
            <option value="${ev.channels[0].link}">${ev.channels[0].displayName}</option>
          </select>
        `;
      }
    }

    div.innerHTML = `
      <div class="info">
        <div class="time-row">
          <div class="time">${ev.time}</div>
          <span class="league-badge">${league}</span>
        </div>
        <div class="match">${ev.match}</div>
        <div class="status ${isActive ? 'live' : isFinished ? 'finished' : 'upcoming'}" data-status="${status}">
          <span class="status-dot"></span>
          <span class="status-text">${status}</span>
        </div>
      </div>

      ${!isFinished ? `
      <div class="channel-selector">
        ${channelSelectHTML}
        <button 
          class="btn-watch ${isActive ? 'enabled' : 'disabled'}"
          data-btn-match-id="${matchId}" 
          ${isActive ? `onclick="watchMatch('${matchId}')"` : ""}
        >
          <span class="btn-icon">${isActive ? '▶' : '⏳'}</span>
          <span class="btn-text">${isActive ? 'Ver' : 'Próximo'}</span>
        </button>
      </div>
      ` : ''}
    `;

    container.appendChild(div);
  });
}

// Actualizar solo los estados sin recrear el DOM
function updateStatuses() {
  const cards = document.querySelectorAll('.card');
  let liveCount = 0;
  let upcomingCount = 0;
  
  cards.forEach(card => {
    const time = card.dataset.time;
    if (!time) return;
    
    const status = getStatus(time);
    const statusEl = card.querySelector('.status');
    const btn = card.querySelector('.btn-watch');
    
    // Contar para stats
    if (status === "EN VIVO") liveCount++;
    else if (status === "PROXIMO") upcomingCount++;
    
    // Solo actualizar si cambió el estado
    if (statusEl && statusEl.dataset.status !== status) {
      statusEl.dataset.status = status;
      
      // Actualizar clase de status
      statusEl.className = `status ${status === 'EN VIVO' ? 'live' : status === 'FINALIZADO' ? 'finished' : 'upcoming'}`;
      
      // Actualizar texto de status
      const statusText = statusEl.querySelector('.status-text');
      if (statusText) statusText.textContent = status;
      
      // Actualizar clase de la card
      card.classList.remove('live', 'finished');
      if (status === 'EN VIVO') card.classList.add('live');
      if (status === 'FINALIZADO') card.classList.add('finished');
      
      // Actualizar botón
      if (btn) {
        const isActive = status === 'EN VIVO';
        btn.className = `btn-watch ${isActive ? 'enabled' : 'disabled'}`;
        btn.onclick = isActive ? () => watchMatch(card.dataset.matchId) : null;
        
        const btnIcon = btn.querySelector('.btn-icon');
        const btnText = btn.querySelector('.btn-text');
        if (btnIcon) btnIcon.textContent = isActive ? '▶' : '⏳';
        if (btnText) btnText.textContent = isActive ? 'Ver' : 'Próximo';
      }
    }
  });
  
  // Actualizar contadores
  document.getElementById("live-count").textContent = `${liveCount} EN VIVO`;
  document.getElementById("upcoming-count").textContent = `${upcomingCount} PRÓXIMOS`;
}

// Ver partido con el canal seleccionado
function watchMatch(matchId) {
  const select = document.querySelector(`select[data-match-id="${matchId}"]`);
  const card = document.querySelector(`.card[data-match-id="${matchId}"]`);
  
  if (select && card) {
    const selectedLink = select.value;
    const matchTitle = card.querySelector('.match').textContent;
    openPlayer(selectedLink, matchTitle);
  }
}

// player
function openPlayer(link, matchTitle) {
  document.getElementById("player").style.display = "block";
  document.getElementById("iframe-player").src = link;
  document.querySelector(".player-title").textContent = `📺 ${matchTitle}`;
  document.body.style.overflow = "hidden";
}

function closePlayer() {
  document.getElementById("player").style.display = "none";
  document.getElementById("iframe-player").src = "";
  document.body.style.overflow = "";
}

// filtro
function filterEvents(text) {
  const filtered = eventsData.filter(e =>
    e.match.toLowerCase().includes(text.toLowerCase())
  );
  renderEvents(filtered);
}

// Close player on escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closePlayer();
});

// INIT - render inicial
